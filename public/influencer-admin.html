<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setoworks - 인플루언서 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --brand: #ff003b;
  --charcoal: #212121;
  --bg: #f7f9fc;
  --card: #fff;
  --sidebar-w: 240px;
  --text: #1a1a2e;
  --muted: #64748b;
  --border: #e2e8f0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }
body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--charcoal);
  color: #fff;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform .3s;
}
.sidebar-brand {
  padding: 28px 24px 8px;
}
.sidebar-brand h1 {
  font-family: 'Poppins', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: #fff;
  letter-spacing: 2px;
}
.sidebar-brand h1 span { color: var(--brand); }
.sidebar-brand .subtitle {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 4px;
}
.sidebar-nav {
  flex: 1;
  padding: 24px 0;
  list-style: none;
}
.sidebar-nav li {
  padding: 0;
}
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 24px;
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all .2s;
  border-left: 3px solid transparent;
}
.sidebar-nav a:hover {
  color: #fff;
  background: rgba(255,255,255,.05);
}
.sidebar-nav a.active {
  color: #fff;
  background: rgba(255,0,59,.12);
  border-left-color: var(--brand);
}
.sidebar-nav a .icon {
  font-size: 18px;
  width: 22px;
  text-align: center;
}
.sidebar-bottom {
  padding: 16px 24px;
  border-top: 1px solid #333;
}
.sidebar-bottom a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 13px;
  display: flex; align-items: center; gap: 6px;
  transition: color .2s;
}
.sidebar-bottom a:hover { color: #fff; }

/* Mobile hamburger */
.hamburger {
  display: none;
  position: fixed; top: 12px; left: 12px;
  z-index: 200;
  background: var(--charcoal);
  color: #fff;
  border: none;
  border-radius: 8px;
  width: 40px; height: 40px;
  font-size: 22px;
  cursor: pointer;
}

/* Main */
.main {
  margin-left: var(--sidebar-w);
  padding: 32px 36px;
  min-height: 100vh;
}
.main h2.view-title {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 24px;
  color: var(--charcoal);
}

/* Cards */
.card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  padding: 20px 24px;
}

/* KPI row */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.kpi-card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--brand);
}
.kpi-card .kpi-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.kpi-card .kpi-value {
  font-family: 'Poppins', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--charcoal);
  margin: 4px 0;
}
.kpi-card .kpi-sub {
  font-size: 12px;
  color: var(--muted);
}

/* Grid layouts */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

/* Chart containers */
.chart-wrap {
  position: relative;
  width: 100%;
}
.chart-wrap canvas {
  width: 100% !important;
}
.card h3 {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 16px;
  color: var(--charcoal);
}

/* Tables */
.table-wrap {
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  background: var(--card);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--charcoal);
  color: #fff;
  font-weight: 600;
  padding: 12px 14px;
  text-align: left;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { background: #333; }
thead th.num { text-align: right; }
tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody td.num {
  text-align: right;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
}
tbody tr:hover { background: #fff5f7; }
tbody tr.expandable { cursor: pointer; }
tbody tr.expanded { background: #fef2f4; }

/* Expand row */
.expand-row td {
  padding: 0;
  background: #fafbfd;
}
.expand-content {
  padding: 20px 24px;
}
.expand-content .detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.expand-content .detail-section h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--charcoal);
}
.expand-content .detail-section p {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.expand-content .detail-section a {
  color: var(--brand);
  text-decoration: none;
  font-size: 12px;
}
.expand-content .memo-area {
  margin-top: 12px;
}
.expand-content .memo-area textarea {
  width: 100%;
  min-height: 60px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  resize: vertical;
}
.expand-content .inner-table {
  width: 100%;
  font-size: 12px;
  margin-top: 8px;
}
.expand-content .inner-table th {
  background: #f1f5f9;
  color: var(--charcoal);
  font-size: 11px;
  padding: 8px 10px;
}
.expand-content .inner-table td {
  padding: 6px 10px;
  border-bottom: 1px solid #f1f5f9;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .3px;
}
.badge-yt { background: #fee2e2; color: #dc2626; }
.badge-ig { background: #f3e8ff; color: #7c3aed; }
.badge-fb { background: #dbeafe; color: #2563eb; }
.badge-nano { background: #ecfdf5; color: #059669; }
.badge-micro { background: #eff6ff; color: #2563eb; }
.badge-mid { background: #fef3c7; color: #d97706; }
.badge-macro { background: #fce7f3; color: #db2777; }
.badge-mega { background: #fae8ff; color: #9333ea; }
.badge-unset { background: #f1f5f9; color: #64748b; }

/* Filter bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.filter-group {
  display: flex;
  gap: 4px;
}
.filter-group label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-right: 6px;
  align-self: center;
}
.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all .15s;
  color: var(--text);
}
.filter-btn:hover { border-color: var(--brand); color: var(--brand); }
.filter-btn.active {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.filter-select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  background: #fff;
  color: var(--text);
  min-width: 120px;
}
.filter-search {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  background: #fff;
  color: var(--text);
  min-width: 180px;
}
.filter-search::placeholder { color: #cbd5e1; }

/* Category cards */
.cat-card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  padding: 20px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.cat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
.cat-card .cat-border {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
}
.cat-card .cat-name {
  font-weight: 700;
  font-size: 16px;
  margin-top: 8px;
  margin-bottom: 12px;
}
.cat-card .cat-stat {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.cat-card .cat-stat strong {
  font-family: 'Poppins', sans-serif;
  color: var(--charcoal);
  font-weight: 600;
}

/* Comparison checkboxes */
.compare-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.compare-selector label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-right: 8px;
  align-self: center;
}
.compare-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  background: #fff;
}
.compare-chip:hover { border-color: var(--brand); }
.compare-chip.selected {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.compare-chip input { display: none; }

/* Sort indicator */
thead th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: .6; }
thead th.sort-asc .sort-arrow::after { content: '▲'; }
thead th.sort-desc .sort-arrow::after { content: '▼'; }

/* View toggle */
.view { display: none; }
.view.active { display: block; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .hamburger { display: block; }
  .main { margin-left: 0; padding: 60px 16px 24px; }
  .grid-2 { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: stretch; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<aside class="sidebar">
  <div class="sidebar-brand">
    <h1><span>S</span>ETOWORKS</h1>
    <div class="subtitle">인플루언서 관리 시스템</div>
  </div>
  <ul class="sidebar-nav">
    <li><a href="#" class="active" data-view="dashboard"><span class="icon">📊</span> 대시보드</a></li>
    <li><a href="#" data-view="channels"><span class="icon">👥</span> 채널 관리</a></li>
    <li><a href="#" data-view="categories"><span class="icon">📁</span> 카테고리</a></li>
    <li><a href="#" data-view="compare"><span class="icon">⚖️</span> 비교 분석</a></li>
  </ul>
  <div class="sidebar-bottom">
    <a href="/">← 메인으로</a>
  </div>
</aside>

<main class="main">
  <!-- View 1: Dashboard -->
  <section id="view-dashboard" class="view active">
    <h2 class="view-title">대시보드</h2>
    <div class="kpi-row" id="kpi-row"></div>
    <div class="grid-2">
      <div class="card">
        <h3>TOP 5 채널 (구독자 수)</h3>
        <div class="chart-wrap"><canvas id="chart-top5" height="260"></canvas></div>
      </div>
      <div class="card">
        <h3>카테고리 분포</h3>
        <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-cat-donut" height="320"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>최근 수집 로그</h3>
      <div class="table-wrap" id="log-table-wrap"></div>
    </div>
  </section>

  <!-- View 2: Channels -->
  <section id="view-channels" class="view">
    <h2 class="view-title">채널 관리</h2>
    <div class="filter-bar" id="channel-filters"></div>
    <div class="table-wrap" id="channel-table-wrap"></div>
  </section>

  <!-- View 3: Categories -->
  <section id="view-categories" class="view">
    <h2 class="view-title">카테고리</h2>
    <div class="grid-3" id="cat-cards"></div>
    <div class="card" style="margin-top:8px">
      <h3>카테고리별 비교 (평균 구독자 vs 평균 조회수)</h3>
      <div class="chart-wrap"><canvas id="chart-cat-compare" height="300"></canvas></div>
    </div>
  </section>

  <!-- View 4: Compare -->
  <section id="view-compare" class="view">
    <h2 class="view-title">비교 분석</h2>
    <div class="compare-selector" id="compare-selector">
      <label>비교 대상 선택 (최대 5개):</label>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>레이더 비교</h3>
        <div class="chart-wrap" style="max-width:400px;margin:0 auto"><canvas id="chart-radar" height="380"></canvas></div>
      </div>
      <div class="card">
        <h3>국가별 인플루언서 분포</h3>
        <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-country" height="320"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px">
      <h3>상세 비교표</h3>
      <div class="table-wrap" id="compare-table-wrap"></div>
    </div>
    <div class="card" style="margin-top:20px">
      <h3>콘텐츠 유형 분포</h3>
      <div class="chart-wrap" style="max-width:500px"><canvas id="chart-content-type" height="260"></canvas></div>
    </div>
  </section>
</main>

<script>
const PALETTE = ['#ff003b','#1e56b0','#d4841a','#0d7c5f','#6d28d9','#be185d','#0ea5e9','#f59e0b'];
const CAT_KR = {lifestyle:'라이프스타일',camping_outdoor:'캠핑/아웃도어',food:'푸드',motorcycle:'모터사이클',tech_unboxing:'테크/언박싱'};

let DATA = null;
let charts = {};
let channelSortCol = null;
let channelSortAsc = true;
let expandedRow = null;

// ─── Navigation ───
document.querySelectorAll('.sidebar-nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const v = a.dataset.view;
    document.querySelectorAll('.sidebar-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.querySelector('.sidebar').classList.remove('open');
  });
});

// ─── Helpers ───
function fmt(n) {
  if (n == null) return '-';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtFull(n) { return n == null ? '-' : n.toLocaleString(); }
function pct(n) { return n == null ? '-' : n.toFixed(2) + '%'; }
function platformBadge(p) {
  const cls = p === 'youtube' ? 'badge-yt' : p === 'instagram' ? 'badge-ig' : 'badge-fb';
  const label = p === 'youtube' ? 'YouTube' : p === 'instagram' ? 'Instagram' : 'Facebook';
  return `<span class="badge ${cls}">${label}</span>`;
}
function tierBadge(t) {
  const cls = 'badge-' + (t || 'unset');
  return `<span class="badge ${cls}">${t || 'unset'}</span>`;
}
function calcER(inf) {
  if (!inf.avg_views || inf.avg_views === 0) return 0;
  return ((inf.avg_likes + inf.avg_comments) / inf.avg_views) * 100;
}

// ─── Load data ───
fetch('/influencer_data.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    renderDashboard();
    renderChannels();
    renderCategories();
    renderCompare();
  })
  .catch(err => {
    document.querySelector('.main').innerHTML = '<div class="card" style="margin:40px;padding:40px;text-align:center"><h3>데이터 로드 실패</h3><p style="color:var(--muted);margin-top:8px">'+err.message+'</p></div>';
  });

// ═══════════════════════════════════════════
// VIEW 1: Dashboard
// ═══════════════════════════════════════════
function renderDashboard() {
  const infs = DATA.influencers;
  const ytInfs = infs.filter(i => i.platform === 'youtube');
  const igCnt = infs.filter(i => i.platform === 'instagram').length;
  const fbCnt = infs.filter(i => i.platform === 'facebook').length;
  const totalContent = infs.reduce((s, i) => s + (i.content_count || 0), 0);
  const avgYtFollowers = ytInfs.length ? Math.round(ytInfs.reduce((s, i) => s + i.followers, 0) / ytInfs.length) : 0;
  const allER = infs.filter(i => i.avg_views > 0);
  const avgER = allER.length ? allER.reduce((s, i) => s + calcER(i), 0) / allER.length : 0;

  const kpis = [
    { label: '총 채널', value: infs.length, sub: `YouTube ${ytInfs.length} · Instagram ${igCnt} · Facebook ${fbCnt}` },
    { label: '활성 콘텐츠', value: fmtFull(totalContent), sub: `YouTube 채널 평균 ${ytInfs.length ? Math.round(totalContent / ytInfs.length) : 0}개` },
    { label: 'YouTube 평균 구독자', value: fmt(avgYtFollowers), sub: `${ytInfs.length}개 채널 기준` },
    { label: '전체 참여율', value: pct(avgER), sub: '(좋아요+댓글)/조회수 평균' }
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');

  // TOP 5 horizontal bar
  const top5 = [...infs].sort((a, b) => b.followers - a.followers).slice(0, 5).reverse();
  if (charts.top5) charts.top5.destroy();
  charts.top5 = new Chart(document.getElementById('chart-top5'), {
    type: 'bar',
    data: {
      labels: top5.map(i => i.display_name),
      datasets: [{
        data: top5.map(i => i.followers),
        backgroundColor: top5.map((_, idx) => PALETTE[idx % PALETTE.length]),
        borderRadius: 6,
        barThickness: 28
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => fmtFull(ctx.raw) + ' 구독자' }
        }
      },
      scales: {
        x: {
          ticks: {
            font: { family: 'Poppins', size: 11 },
            callback: v => fmt(v)
          },
          grid: { color: '#f1f5f9' }
        },
        y: {
          ticks: {
            font: { family: 'Noto Sans KR', size: 12 },
            crossAlign: 'far'
          },
          grid: { display: false }
        }
      }
    }
  });

  // Category donut
  const cats = DATA.categories;
  if (charts.catDonut) charts.catDonut.destroy();
  charts.catDonut = new Chart(document.getElementById('chart-cat-donut'), {
    type: 'doughnut',
    data: {
      labels: cats.map(c => CAT_KR[c.category] || c.category),
      datasets: [{
        data: cats.map(c => c.cnt),
        backgroundColor: PALETTE.slice(0, cats.length),
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            padding: 14,
            font: { family: 'Noto Sans KR', size: 12 },
            usePointStyle: true,
            pointStyleWidth: 10
          }
        }
      }
    }
  });

  // Log table
  const logs = DATA.logs || [];
  let logHtml = '<table><thead><tr><th>플랫폼</th><th>상태</th><th class="num">프로필 수</th><th class="num">콘텐츠 수</th><th>시작 시간</th></tr></thead><tbody>';
  logs.forEach(l => {
    const statusColor = l.status === 'completed' ? '#059669' : l.status === 'running' ? '#d97706' : '#dc2626';
    logHtml += `<tr>
      <td>${platformBadge(l.platform)}</td>
      <td><span style="color:${statusColor};font-weight:600">${l.status}</span></td>
      <td class="num">${l.profiles_collected}</td>
      <td class="num">${l.contents_collected}</td>
      <td style="font-size:12px;color:var(--muted)">${new Date(l.started_at).toLocaleString('ko-KR')}</td>
    </tr>`;
  });
  logHtml += '</tbody></table>';
  document.getElementById('log-table-wrap').innerHTML = logHtml;
}

// ═══════════════════════════════════════════
// VIEW 2: Channels
// ═══════════════════════════════════════════
let chFilters = { platform: 'all', tier: 'all', category: 'all', search: '' };

function renderChannels() {
  renderChannelFilters();
  renderChannelTable();
}

function renderChannelFilters() {
  const allCats = [...new Set(DATA.influencers.map(i => i.category))];
  let html = '';

  // Platform
  html += '<div class="filter-group"><label>플랫폼</label>';
  ['all','youtube','instagram','facebook'].forEach(p => {
    const label = p === 'all' ? '전체' : p === 'youtube' ? 'YouTube' : p === 'instagram' ? 'Instagram' : 'Facebook';
    html += `<button class="filter-btn ${chFilters.platform===p?'active':''}" onclick="setChFilter('platform','${p}')">${label}</button>`;
  });
  html += '</div>';

  // Tier
  html += '<div class="filter-group"><label>Tier</label>';
  ['all','nano','micro','mid','macro','mega','unset'].forEach(t => {
    html += `<button class="filter-btn ${chFilters.tier===t?'active':''}" onclick="setChFilter('tier','${t}')">${t === 'all' ? '전체' : t}</button>`;
  });
  html += '</div>';

  // Category
  html += `<div class="filter-group"><label>카테고리</label><select class="filter-select" onchange="setChFilter('category',this.value)">`;
  html += '<option value="all">전체</option>';
  allCats.forEach(c => {
    html += `<option value="${c}" ${chFilters.category===c?'selected':''}>${CAT_KR[c]||c}</option>`;
  });
  html += '</select></div>';

  // Search
  html += `<div class="filter-group" style="margin-left:auto"><input type="text" class="filter-search" placeholder="채널명 검색..." value="${chFilters.search}" oninput="setChFilter('search',this.value)"></div>`;

  document.getElementById('channel-filters').innerHTML = html;
}

function setChFilter(key, val) {
  chFilters[key] = val;
  expandedRow = null;
  renderChannelFilters();
  renderChannelTable();
}

function getFilteredInfluencers() {
  let list = [...DATA.influencers];
  if (chFilters.platform !== 'all') list = list.filter(i => i.platform === chFilters.platform);
  if (chFilters.tier !== 'all') {
    if (chFilters.tier === 'unset') list = list.filter(i => !i.tier || i.tier === 'unset');
    else list = list.filter(i => i.tier === chFilters.tier);
  }
  if (chFilters.category !== 'all') list = list.filter(i => i.category === chFilters.category);
  if (chFilters.search) {
    const q = chFilters.search.toLowerCase();
    list = list.filter(i => i.display_name.toLowerCase().includes(q));
  }
  if (channelSortCol) {
    list.sort((a, b) => {
      let va = a[channelSortCol], vb = b[channelSortCol];
      if (typeof va === 'string') return channelSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return channelSortAsc ? (va||0) - (vb||0) : (vb||0) - (va||0);
    });
  }
  return list;
}

function renderChannelTable() {
  const list = getFilteredInfluencers();
  const cols = [
    { key: '#', label: '#' },
    { key: 'display_name', label: '채널명' },
    { key: 'platform', label: '플랫폼' },
    { key: 'followers', label: '구독자', num: true },
    { key: 'content_count', label: '콘텐츠', num: true },
    { key: 'avg_views', label: '평균 조회수', num: true },
    { key: 'er', label: '참여율', num: true },
    { key: 'tier', label: 'Tier' },
    { key: 'category', label: '카테고리' }
  ];

  let html = '<table><thead><tr>';
  cols.forEach(c => {
    if (c.key === '#') { html += '<th style="width:40px">#</th>'; return; }
    const isSorted = channelSortCol === c.key;
    const cls = (c.num ? 'num ' : '') + (isSorted ? (channelSortAsc ? 'sort-asc' : 'sort-desc') : '');
    html += `<th class="${cls}" onclick="sortChannels('${c.key}')">${c.label}<span class="sort-arrow"></span></th>`;
  });
  html += '</tr></thead><tbody>';

  list.forEach((inf, idx) => {
    const er = calcER(inf);
    const isExpanded = expandedRow === inf.id;
    html += `<tr class="expandable ${isExpanded?'expanded':''}" onclick="toggleExpand('${inf.id}')">
      <td>${idx + 1}</td>
      <td style="font-weight:600">${inf.display_name}</td>
      <td>${platformBadge(inf.platform)}</td>
      <td class="num">${fmt(inf.followers)}</td>
      <td class="num">${inf.content_count}</td>
      <td class="num">${fmt(inf.avg_views)}</td>
      <td class="num">${pct(er)}</td>
      <td>${tierBadge(inf.tier)}</td>
      <td>${CAT_KR[inf.category] || inf.category}</td>
    </tr>`;

    if (isExpanded) {
      html += `<tr class="expand-row"><td colspan="${cols.length}">`;
      html += renderExpandContent(inf);
      html += '</td></tr>';
    }
  });

  if (!list.length) {
    html += `<tr><td colspan="${cols.length}" style="text-align:center;padding:40px;color:var(--muted)">조건에 맞는 채널이 없습니다</td></tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('channel-table-wrap').innerHTML = html;
}

function renderExpandContent(inf) {
  const contents = (DATA.top_contents || []).filter(c => c.influencer_id === inf.id);
  const memo = localStorage.getItem('memo_' + inf.id) || '';
  const er = inf.avg_views > 0 ? ((inf.avg_likes + inf.avg_comments) / inf.avg_views * 100).toFixed(2) : '0.00';
  const totalEng = Math.round(inf.avg_likes * inf.content_count + inf.avg_comments * inf.content_count);
  const viewPerSub = inf.followers > 0 ? (inf.total_views / inf.followers).toFixed(1) : '-';
  const likeRate = inf.avg_views > 0 ? (inf.avg_likes / inf.avg_views * 100).toFixed(2) : '0';
  const commentRate = inf.avg_views > 0 ? (inf.avg_comments / inf.avg_views * 100).toFixed(2) : '0';
  const subViewRatio = inf.content_count > 0 && inf.avg_views > 0 ? (inf.followers / inf.avg_views).toFixed(2) : '-';

  let html = '<div class="expand-content" onclick="event.stopPropagation()">';

  // Row 1: Profile + 성과 요약표 (Performance Statement)
  html += '<div class="detail-grid">';

  html += '<div class="detail-section">';
  html += '<h4>프로필 정보</h4>';
  html += `<p><strong>국가:</strong> ${inf.country || '-'} &nbsp; <strong>언어:</strong> ${inf.language || '-'}</p>`;
  html += `<p><strong>등급:</strong> ${inf.grade || '-'} &nbsp; <strong>Pure Score:</strong> ${inf.pure_score != null ? inf.pure_score : '-'}</p>`;
  if (inf.bio) html += `<p><strong>소개:</strong> ${inf.bio}</p>`;
  if (inf.contact_email) html += `<p><strong>이메일:</strong> <span style="color:var(--brand)">${inf.contact_email}</span></p>`;
  if (inf.profile_url) html += `<p><a href="${inf.profile_url}" target="_blank" style="color:var(--brand)">프로필 링크 열기 →</a></p>`;
  html += '</div>';

  // 성과 요약표 (Financial Statement Style)
  html += '<div class="detail-section">';
  html += '<h4>성과 요약표 (Performance Statement)</h4>';
  html += '<table class="inner-table" style="font-variant-numeric:tabular-nums;">';
  html += `<thead><tr><th colspan="2" style="text-align:center;background:var(--charcoal);color:#fff;font-size:12px;">구독자: ${fmtFull(inf.followers)} · 콘텐츠: ${inf.content_count}건</th></tr></thead>`;
  html += '<tbody>';
  html += `<tr><td style="padding-left:16px">총 조회수 (Total Views)</td><td class="num" style="font-weight:600">${fmtFull(inf.total_views)}</td></tr>`;
  html += `<tr><td style="padding-left:16px">총 좋아요 (Total Likes)</td><td class="num">${fmtFull(Math.round(inf.avg_likes * inf.content_count))}</td></tr>`;
  html += `<tr><td style="padding-left:16px">총 댓글 (Total Comments)</td><td class="num">${fmtFull(Math.round(inf.avg_comments * inf.content_count))}</td></tr>`;
  html += `<tr style="border-top:2px solid var(--charcoal);font-weight:700"><td style="padding-left:16px">총 참여 (Total Engagements)</td><td class="num">${fmtFull(totalEng)}</td></tr>`;
  html += '<tr><td colspan="2" style="height:6px;border:none"></td></tr>';
  html += `<tr><td style="padding-left:16px">평균 조회수 / 영상</td><td class="num">${fmtFull(Math.round(inf.avg_views))}</td></tr>`;
  html += `<tr><td style="padding-left:16px">평균 좋아요 / 영상</td><td class="num">${fmtFull(Math.round(inf.avg_likes))}</td></tr>`;
  html += `<tr><td style="padding-left:16px">평균 댓글 / 영상</td><td class="num">${fmtFull(Math.round(inf.avg_comments))}</td></tr>`;
  html += `<tr style="border-top:2px solid var(--charcoal);border-bottom:3px double var(--charcoal);font-weight:800"><td style="padding-left:16px">평균 참여율 (Avg ER)</td><td class="num" style="color:var(--brand)">${er}%</td></tr>`;
  html += '</tbody></table>';
  html += '</div>';
  html += '</div>';

  // Row 2: 효율성 지표
  html += '<div style="margin-top:12px">';
  html += '<h4 style="margin-bottom:6px">효율성 지표 (Efficiency Ratios)</h4>';
  html += '<table class="inner-table" style="font-variant-numeric:tabular-nums;">';
  html += '<tbody>';
  html += `<tr><td style="padding-left:16px">구독자 대비 총 조회수 (Views / Subscriber)</td><td class="num" style="font-weight:600">${viewPerSub}x</td></tr>`;
  html += `<tr><td style="padding-left:16px">영상당 평균 조회수 (Views / Video)</td><td class="num">${fmtFull(Math.round(inf.avg_views))}</td></tr>`;
  html += `<tr><td style="padding-left:16px">좋아요율 (Likes / Views)</td><td class="num">${likeRate}%</td></tr>`;
  html += `<tr><td style="padding-left:16px">댓글율 (Comments / Views)</td><td class="num">${commentRate}%</td></tr>`;
  html += `<tr style="border-top:2px solid var(--charcoal);border-bottom:3px double var(--charcoal);font-weight:800"><td style="padding-left:16px">구독자/영상조회 비율 (Sub-to-View)</td><td class="num">${subViewRatio}</td></tr>`;
  html += '</tbody></table>';
  html += `<p style="font-size:11px;color:var(--muted);margin-top:4px">* Sub-to-View &lt; 1.0 → 바이럴 성향 / &gt; 1.0 → 구독자 대비 조회수 부족</p>`;
  html += '</div>';

  // Row 3: 콘텐츠 원장
  if (contents.length) {
    html += '<div style="margin-top:12px">';
    html += `<h4 style="margin-bottom:6px">콘텐츠 원장 (Content Ledger) — ${contents.length}건</h4>`;
    html += '<div style="max-height:300px;overflow:auto"><table class="inner-table"><thead><tr><th>#</th><th>제목</th><th>유형</th><th style="text-align:right">조회수</th><th style="text-align:right">좋아요</th><th style="text-align:right">댓글</th><th style="text-align:right">참여율</th><th>날짜</th></tr></thead><tbody>';
    contents.sort((a,b) => (b.views||0) - (a.views||0)).forEach((c, i) => {
      const cEr = c.views > 0 ? ((c.likes + c.comments) / c.views * 100).toFixed(2) : '0';
      const avgER = parseFloat(er);
      const erStyle = parseFloat(cEr) > avgER * 1.5 ? 'color:#059669;font-weight:700' : parseFloat(cEr) < avgER * 0.5 ? 'color:#dc2626' : '';
      html += `<tr>
        <td>${i + 1}</td>
        <td><a href="${c.content_url || '#'}" target="_blank" style="color:var(--brand);text-decoration:none;font-size:12px">${c.title ? c.title.substring(0, 45) : '-'}${c.title && c.title.length > 45 ? '...' : ''}</a></td>
        <td><span class="badge badge-unset">${c.content_type || '-'}</span></td>
        <td class="num">${fmtFull(c.views)}</td>
        <td class="num">${fmtFull(c.likes)}</td>
        <td class="num">${fmtFull(c.comments)}</td>
        <td class="num" style="${erStyle}">${cEr}%</td>
        <td style="font-size:11px;color:var(--muted)">${c.published_at ? new Date(c.published_at).toLocaleDateString('ko-KR') : '-'}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    html += '</div>';
  } else {
    html += '<p style="font-size:12px;color:var(--muted);margin-top:12px">수집된 콘텐츠가 없습니다</p>';
  }

  // Memo
  html += `<div class="memo-area">
    <h4 style="margin-bottom:6px">메모</h4>
    <textarea placeholder="이 채널에 대한 메모를 입력하세요..." onchange="saveMemo('${inf.id}', this.value)" onclick="event.stopPropagation()">${memo}</textarea>
  </div>`;

  html += '</div>';
  return html;
}

function toggleExpand(id) {
  const nid = Number(id);
  expandedRow = expandedRow === nid ? null : nid;
  renderChannelTable();
}

function saveMemo(id, val) {
  localStorage.setItem('memo_' + id, val);
}

function sortChannels(col) {
  if (channelSortCol === col) channelSortAsc = !channelSortAsc;
  else { channelSortCol = col; channelSortAsc = col === 'display_name' || col === 'platform' || col === 'category'; }
  renderChannelTable();
}

// ═══════════════════════════════════════════
// VIEW 3: Categories
// ═══════════════════════════════════════════
function renderCategories() {
  const infs = DATA.influencers;
  const cats = DATA.categories;
  const catColors = {};
  cats.forEach((c, i) => catColors[c.category] = PALETTE[i % PALETTE.length]);

  // Cards
  let cardsHtml = '';
  cats.forEach(cat => {
    const catInfs = infs.filter(i => i.category === cat.category);
    const avgF = catInfs.length ? Math.round(catInfs.reduce((s, i) => s + i.followers, 0) / catInfs.length) : 0;
    const avgV = catInfs.length ? Math.round(catInfs.reduce((s, i) => s + (i.avg_views || 0), 0) / catInfs.length) : 0;
    cardsHtml += `<div class="cat-card" onclick="goToCatChannel('${cat.category}')">
      <div class="cat-border" style="background:${catColors[cat.category]}"></div>
      <div class="cat-name">${CAT_KR[cat.category] || cat.category}</div>
      <div class="cat-stat">채널 수: <strong>${cat.cnt}</strong></div>
      <div class="cat-stat">평균 구독자: <strong>${fmt(avgF)}</strong></div>
      <div class="cat-stat">평균 조회수: <strong>${fmt(avgV)}</strong></div>
    </div>`;
  });
  document.getElementById('cat-cards').innerHTML = cardsHtml;

  // Grouped bar chart
  const labels = cats.map(c => CAT_KR[c.category] || c.category);
  const avgFollowers = cats.map(cat => {
    const ci = infs.filter(i => i.category === cat.category);
    return ci.length ? Math.round(ci.reduce((s, i) => s + i.followers, 0) / ci.length) : 0;
  });
  const avgViews = cats.map(cat => {
    const ci = infs.filter(i => i.category === cat.category);
    return ci.length ? Math.round(ci.reduce((s, i) => s + (i.avg_views || 0), 0) / ci.length) : 0;
  });

  if (charts.catCompare) charts.catCompare.destroy();
  charts.catCompare = new Chart(document.getElementById('chart-cat-compare'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '평균 구독자', data: avgFollowers, backgroundColor: '#ff003b', borderRadius: 6, barPercentage: 0.4 },
        { label: '평균 조회수', data: avgViews, backgroundColor: '#1e56b0', borderRadius: 6, barPercentage: 0.4 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { family: 'Noto Sans KR', size: 12 }, usePointStyle: true, padding: 16 }
        },
        tooltip: {
          callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtFull(ctx.raw) }
        }
      },
      scales: {
        x: {
          ticks: { font: { family: 'Poppins', size: 11 }, callback: v => fmt(v) },
          grid: { color: '#f1f5f9' }
        },
        y: {
          ticks: { font: { family: 'Noto Sans KR', size: 12 } },
          grid: { display: false }
        }
      }
    }
  });
}

function goToCatChannel(cat) {
  chFilters.category = cat;
  expandedRow = null;
  document.querySelectorAll('.sidebar-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.view === 'channels');
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-channels').classList.add('active');
  renderChannelFilters();
  renderChannelTable();
}

// ═══════════════════════════════════════════
// VIEW 4: Compare
// ═══════════════════════════════════════════
let compareSelected = [];

function renderCompare() {
  const infs = DATA.influencers;
  if (!compareSelected.length) {
    compareSelected = [...infs].sort((a, b) => b.followers - a.followers).slice(0, 3).map(i => String(i.id));
  }
  renderCompareSelector();
  renderCompareCharts();
}

function renderCompareSelector() {
  const infs = DATA.influencers;
  let html = '<label>비교 대상 선택 (최대 5개):</label>';
  infs.forEach(inf => {
    const sid = String(inf.id);
    const sel = compareSelected.includes(sid);
    html += `<div class="compare-chip ${sel?'selected':''}" onclick="toggleCompare('${sid}')">
      <span>${inf.display_name}</span>
    </div>`;
  });
  document.getElementById('compare-selector').innerHTML = html;
}

function toggleCompare(id) {
  const sid = String(id);
  const idx = compareSelected.indexOf(sid);
  if (idx >= 0) {
    if (compareSelected.length <= 1) return;
    compareSelected.splice(idx, 1);
  } else {
    if (compareSelected.length >= 5) return;
    compareSelected.push(sid);
  }
  renderCompareSelector();
  renderCompareCharts();
}

function renderCompareCharts() {
  const infs = DATA.influencers;
  const sel = infs.filter(i => compareSelected.includes(String(i.id)));

  // Normalize values for radar
  const maxF = Math.max(...infs.map(i => i.followers)) || 1;
  const maxER = Math.max(...infs.filter(i => i.avg_views > 0).map(i => calcER(i))) || 1;
  const maxCC = Math.max(...infs.map(i => i.content_count)) || 1;
  const maxAV = Math.max(...infs.map(i => i.avg_views || 0)) || 1;
  const maxTV = Math.max(...infs.map(i => i.total_views || 0)) || 1;

  // Radar
  if (charts.radar) charts.radar.destroy();
  charts.radar = new Chart(document.getElementById('chart-radar'), {
    type: 'radar',
    data: {
      labels: ['도달력', '참여율', '콘텐츠양', '평균조회', '규모'],
      datasets: sel.map((inf, idx) => ({
        label: inf.display_name,
        data: [
          (inf.followers / maxF) * 100,
          (calcER(inf) / maxER) * 100,
          (inf.content_count / maxCC) * 100,
          ((inf.avg_views || 0) / maxAV) * 100,
          ((inf.total_views || 0) / maxTV) * 100
        ],
        backgroundColor: PALETTE[idx % PALETTE.length] + '22',
        borderColor: PALETTE[idx % PALETTE.length],
        borderWidth: 2,
        pointBackgroundColor: PALETTE[idx % PALETTE.length],
        pointRadius: 4
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: { stepSize: 25, font: { family: 'Poppins', size: 10 }, backdropColor: 'transparent' },
          pointLabels: { font: { family: 'Noto Sans KR', size: 12, weight: '600' } },
          grid: { color: '#e2e8f0' },
          angleLines: { color: '#e2e8f0' }
        }
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Noto Sans KR', size: 11 }, usePointStyle: true, padding: 12 }
        }
      }
    }
  });

  // Country breakdown
  const countryMap = {};
  infs.forEach(i => { countryMap[i.country || 'Unknown'] = (countryMap[i.country || 'Unknown'] || 0) + 1; });
  const countryLabels = Object.keys(countryMap);
  const countryData = Object.values(countryMap);

  if (charts.country) charts.country.destroy();
  charts.country = new Chart(document.getElementById('chart-country'), {
    type: 'doughnut',
    data: {
      labels: countryLabels,
      datasets: [{
        data: countryData,
        backgroundColor: PALETTE.slice(0, countryLabels.length),
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Noto Sans KR', size: 12 }, usePointStyle: true, padding: 14 }
        }
      }
    }
  });

  // Comparison table
  const metrics = [
    { label: '구독자', key: 'followers', fmt: fmtFull },
    { label: '평균 조회수', key: 'avg_views', fmt: fmtFull },
    { label: '평균 좋아요', key: 'avg_likes', fmt: fmtFull },
    { label: '평균 댓글', key: 'avg_comments', fmt: fmtFull },
    { label: '참여율', key: 'er', fmt: pct },
    { label: '콘텐츠 수', key: 'content_count', fmt: v => v },
    { label: '총 조회수', key: 'total_views', fmt: fmtFull }
  ];

  let tHtml = '<table><thead><tr><th>지표</th>';
  sel.forEach(inf => { tHtml += `<th class="num">${inf.display_name}</th>`; });
  tHtml += '</tr></thead><tbody>';
  metrics.forEach(m => {
    tHtml += '<tr>';
    tHtml += `<td style="font-weight:600">${m.label}</td>`;
    // Find max for highlighting
    let vals = sel.map(inf => m.key === 'er' ? calcER(inf) : (inf[m.key] || 0));
    let maxVal = Math.max(...vals);
    sel.forEach((inf, i) => {
      const v = m.key === 'er' ? calcER(inf) : (inf[m.key] || 0);
      const isMax = v === maxVal && v > 0;
      tHtml += `<td class="num" style="${isMax ? 'color:var(--brand);font-weight:700' : ''}">${m.fmt(v)}</td>`;
    });
    tHtml += '</tr>';
  });
  tHtml += '</tbody></table>';
  document.getElementById('compare-table-wrap').innerHTML = tHtml;

  // Content type breakdown
  const allContents = DATA.top_contents || [];
  const typeMap = {};
  allContents.forEach(c => {
    const t = c.content_type || 'unknown';
    typeMap[t] = (typeMap[t] || 0) + 1;
  });
  const typeLabels = Object.keys(typeMap);
  const typeData = Object.values(typeMap);

  if (charts.contentType) charts.contentType.destroy();
  if (typeLabels.length) {
    charts.contentType = new Chart(document.getElementById('chart-content-type'), {
      type: 'bar',
      data: {
        labels: typeLabels,
        datasets: [{
          data: typeData,
          backgroundColor: PALETTE.slice(0, typeLabels.length),
          borderRadius: 6,
          barThickness: 40
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.raw + '개' } }
        },
        scales: {
          x: {
            ticks: { font: { family: 'Poppins', size: 11 }, stepSize: 1 },
            grid: { color: '#f1f5f9' }
          },
          y: {
            ticks: { font: { family: 'Noto Sans KR', size: 12 } },
            grid: { display: false }
          }
        }
      }
    });
  } else {
    document.getElementById('chart-content-type').parentElement.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:20px">콘텐츠 유형 데이터가 없습니다</p>';
  }
}
</script>
</body>
</html>
