<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setoworks - 인플루언서 관리 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --tblr-primary: #ff003b;
  --tblr-primary-rgb: 255, 0, 59;
  --tblr-font-sans-serif: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
}
body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
.navbar-vertical { background: #212121 !important; }
.navbar-vertical .navbar-brand {
  font-family: 'Poppins', sans-serif; font-weight: 800; letter-spacing: 0.05em;
  color: #fff !important; font-size: 1.2rem;
}
.navbar-vertical .navbar-brand span { color: var(--tblr-primary); }
.navbar-vertical .nav-link { color: #94a3b8 !important; font-size: 14px; font-weight: 500; }
.navbar-vertical .nav-link:hover { color: #fff !important; background: rgba(255,255,255,.05); }
.navbar-vertical .nav-link.active { color: #fff !important; background: rgba(255,0,59,.12) !important; border-left: 3px solid var(--tblr-primary); }
.navbar-vertical .nav-link .nav-link-icon { font-size: 18px; }
.sidebar-footer-link { color: #94a3b8 !important; text-decoration: none; font-size: 13px; }
.sidebar-footer-link:hover { color: #fff !important; }

.view { display: none; }
.view.active { display: block; }

/* KPI number style */
.kpi-number { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 700; }
.kpi-sub { font-size: 12px; }

/* Score bar */
.score-bar-wrap { display: flex; align-items: center; gap: 8px; }
.score-num { font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; }

/* Grade badges */
.grade-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 8px;
  font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 14px;
}
.grade-S { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #78350f; box-shadow: 0 0 8px rgba(245,158,11,.4); }
.grade-A { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #fff; }
.grade-B { background: #e2e8f0; color: #64748b; }
.grade-C { background: #fee2e2; color: #dc2626; }

/* Expand row */
.expandable { cursor: pointer; }
.expandable:hover { background: #fff5f7 !important; }
.expanded { background: #fef2f4 !important; }
.expand-row td { padding: 0 !important; background: #fafbfd; }
.expand-content { padding: 20px 24px; }

/* Profile image */
.profile-img-lg {
  width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
  border: 2px solid #e2e8f0;
}

/* Pure score display */
.pure-score-number {
  font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 800;
}

/* Memo system */
.memo-item { position: relative; }
.memo-item .memo-time { font-size: 10px; font-family: 'Poppins', sans-serif; }
.memo-item .memo-text { font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
.memo-item .memo-actions { position: absolute; top: 8px; right: 8px; }

/* Category cards */
.cat-card { cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
.cat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.cat-card .cat-border { position: absolute; top: 0; left: 0; right: 0; height: 4px; }

/* Compare chips */
.compare-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 20px;
  font-size: 12px; cursor: pointer; transition: all .15s; background: #fff;
}
.compare-chip:hover { border-color: var(--tblr-primary); }
.compare-chip.selected { background: var(--tblr-primary); color: #fff; border-color: var(--tblr-primary); }

/* Sort arrow */
th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: .6; }
th.sort-asc .sort-arrow::after { content: '\25B2'; }
th.sort-desc .sort-arrow::after { content: '\25BC'; }

/* Tabular nums in tables */
.num { text-align: right; font-family: 'Poppins', sans-serif; font-weight: 500; }
.table th.sortable { cursor: pointer; user-select: none; }
.table th.sortable:hover { background: rgba(0,0,0,.05); }

/* Tooltip */
.score-tooltip { position: relative; cursor: help; }
.score-tooltip .tooltip-content {
  display: none; position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%); background: #212121; color: #fff;
  padding: 10px 14px; border-radius: 8px; font-size: 11px;
  white-space: nowrap; z-index: 50; margin-bottom: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.score-tooltip .tooltip-content::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 6px solid transparent;
  border-top-color: #212121;
}
.score-tooltip:hover .tooltip-content { display: block; }

/* inner table styling */
.inner-table { width: 100%; font-size: 12px; }
.inner-table th { background: #f1f5f9; font-size: 11px; padding: 8px 10px; font-weight: 600; }
.inner-table td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }

/* btn-more */
.btn-more {
  display: block; width: 100%; padding: 10px; margin-top: 8px;
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; text-align: center; transition: all .15s; color: #64748b;
}
.btn-more:hover { border-color: var(--tblr-primary); color: var(--tblr-primary); }

/* Chart canvas fix */
.chart-wrap canvas { width: 100% !important; }

/* Card top accent */
.card-accent { border-top: 3px solid var(--tblr-primary); }

/* Badge overrides for platforms */
.badge-youtube { background: #fee2e2 !important; color: #dc2626 !important; }
.badge-instagram { background: #f3e8ff !important; color: #7c3aed !important; }
.badge-facebook { background: #dbeafe !important; color: #2563eb !important; }
</style>
</head>
<body>
<div class="page">
  <!-- Sidebar -->
  <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark" style="width:240px;">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <h1 class="navbar-brand navbar-brand-autodark">
        <span>S</span>ETOWORKS
      </h1>
      <div class="collapse navbar-collapse" id="sidebar-menu">
        <ul class="navbar-nav flex-column pt-2">
          <li class="nav-item">
            <a class="nav-link active" href="#" data-view="dashboard">
              <span class="nav-link-icon">&#128202;</span>
              <span class="nav-link-title">대시보드</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-view="channels">
              <span class="nav-link-icon">&#128101;</span>
              <span class="nav-link-title">채널 관리</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-view="categories">
              <span class="nav-link-icon">&#128193;</span>
              <span class="nav-link-title">카테고리</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-view="compare">
              <span class="nav-link-icon">&#9878;&#65039;</span>

        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
          <a href="/" class="sidebar-footer-link">&larr; 메인으로</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="page-wrapper">
    <!-- View 1: Dashboard -->
    <section id="view-dashboard" class="view active">
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="page-pretitle">Setoworks</div>
          <h2 class="page-title">인플루언서 대시보드</h2>
        </div>
      </div>
      <div class="page-body">
        <div class="container-xl">
          <div class="row row-deck row-cards" id="kpi-row"></div>
          <div class="row row-deck row-cards mt-3">
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">TOP 7 채널 (구독자 수)</h3></div>
                <div class="card-body">
                  <div class="chart-wrap"><canvas id="chart-top5" height="280"></canvas></div>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">카테고리 분포</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-cat-donut" height="320"></canvas></div>
                </div>
              </div>
            </div>
          </div>
          <div class="row row-deck row-cards mt-3">
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">등급 분포</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-grade-donut" height="320"></canvas></div>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">국가별 분포</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-country-dash" height="320"></canvas></div>
                </div>
              </div>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12">
              <div class="card">
                <div class="card-header"><h3 class="card-title">최근 수집 로그</h3></div>
                <div class="card-body p-0" id="log-table-wrap"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- View 2: Channels -->
    <section id="view-channels" class="view">
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="page-pretitle">Setoworks</div>
          <h2 class="page-title">채널 관리</h2>
        </div>
      </div>
      <div class="page-body">
        <div class="container-xl">
          <div class="card mb-3">
            <div class="card-body" id="channel-filters"></div>
          </div>
          <div id="channel-count" class="mb-2 text-muted" style="font-size:13px;"></div>
          <div class="card">
            <div class="table-responsive" id="channel-table-wrap"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- View 3: Categories -->
    <section id="view-categories" class="view">
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="page-pretitle">Setoworks</div>

        </div>
      </div>
      <div class="page-body">
        <div class="container-xl">
          <div class="card mb-3">
            <div class="card-body" id="cat-filter-bar"></div>
          </div>
          <div class="row row-deck row-cards" id="cat-cards"></div>
          <div class="row mt-3">
            <div class="col-12">
              <div class="card">
                <div class="card-header"><h3 class="card-title">카테고리별 비교 (평균 구독자 vs 평균 조회수)</h3></div>
                <div class="card-body">

                </div>
              </div>
            </div>
          </div>

    <!-- View 4: Compare -->
    <section id="view-compare" class="view">
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="page-pretitle">Setoworks</div>
          <h2 class="page-title">비교 분석</h2>
        </div>
      </div>
      <div class="page-body">
        <div class="container-xl">
          <div class="card mb-3">
            <div class="card-body" id="compare-filter-bar"></div>
          </div>
          <div class="card mb-3">
            <div class="card-body" id="compare-selector">
              <label class="form-label text-muted fw-bold">비교 대상 선택 (최대 5개):</label>
            </div>

            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">레이더 비교</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:400px;margin:0 auto"><canvas id="chart-radar" height="380"></canvas></div>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">국가별 인플루언서 분포</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:320px;margin:0 auto"><canvas id="chart-country" height="320"></canvas></div>
                </div>
              </div>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12">
              <div class="card">
                <div class="card-header"><h3 class="card-title">상세 비교표</h3></div>
                <div class="card-body p-0" id="compare-table-wrap"></div>
              </div>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12">
              <div class="card">
                <div class="card-header"><h3 class="card-title">콘텐츠 유형 분포</h3></div>
                <div class="card-body">
                  <div class="chart-wrap" style="max-width:500px"><canvas id="chart-content-type" height="260"></canvas></div>
                </div>

          </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
<script>
const PALETTE = ['#ff003b','#1e56b0','#d4841a','#0d7c5f','#6d28d9','#be185d','#0ea5e9','#f59e0b'];
const CAT_KR = {
  'fashion': '패션', 'lifestyle': '라이프스타일', 'fitness': '피트니스',
  'beauty': '뷰티', 'camping_outdoor': '캠핑/아웃도어', 'food': '푸드/요리',
  'motorcycle': '모터사이클', 'tech_unboxing': '테크/언박싱'
};
const COUNTRY_KR = { 'JP': '일본 \u{1F1EF}\u{1F1F5}', 'TW': '대만 \u{1F1F9}\u{1F1FC}', 'KR': '한국 \u{1F1F0}\u{1F1F7}', 'GB': '영국 \u{1F1EC}\u{1F1E7}', 'SG': '싱가포르 \u{1F1F8}\u{1F1EC}', 'TH': '태국 \u{1F1F9}\u{1F1ED}' };

let DATA = null;
let charts = {};
let channelSortCol = null;
let channelSortAsc = true;
let expandedRow = null;

// ─── Navigation ───
document.querySelectorAll('.navbar-nav .nav-link').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const v = a.dataset.view;
    if (!v) return;
    document.querySelectorAll('.navbar-nav .nav-link').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    // Close mobile menu
    var collapse = document.getElementById('sidebar-menu');
    if (collapse && collapse.classList.contains('show')) {
      var bsCollapse = bootstrap.Collapse.getInstance(collapse);
      if (bsCollapse) bsCollapse.hide();
    }
  });
});

// ─── Helpers ───
function fmt(n) {
  if (n == null) return '-';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtFull(n) { return n == null ? '-' : n.toLocaleString(); }
function pct(n) { return n == null ? '-' : n.toFixed(2) + '%'; }
function platformBadge(p) {
  const cls = p === 'youtube' ? 'badge-youtube' : p === 'instagram' ? 'badge-instagram' : 'badge-facebook';
  const label = p === 'youtube' ? 'YouTube' : p === 'instagram' ? 'Instagram' : 'Facebook';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}
function tierBadge(t) {
  const colorMap = { nano: 'bg-green-lt', micro: 'bg-blue-lt', mid: 'bg-yellow-lt', macro: 'bg-pink-lt', mega: 'bg-purple-lt' };
  return '<span class="badge ' + (colorMap[t] || 'bg-secondary-lt') + '">' + (t || 'unset') + '</span>';
}
function gradeBadge(g) {
  if (!g) return '<span class="grade-badge grade-B">-</span>';
  return '<span class="grade-badge grade-' + g + '">' + g + '</span>';
}
function calcER(inf) {
  if (!inf.avg_views || inf.avg_views === 0) return 0;
  return ((inf.avg_likes + inf.avg_comments) / inf.avg_views) * 100;
}
function scoreColor(s) {
  if (s >= 80) return '#f59e0b';
  if (s >= 60) return '#059669';
  if (s >= 40) return '#d97706';
  return '#dc2626';
}
function scoreBarHtml(score, size) {
  if (score == null) return '-';
  const color = scoreColor(score);
  const w = Math.min(score, 100);
  if (size === 'sm') {
    return '<div class="score-bar-wrap"><div class="progress" style="width:80px;height:8px;"><div class="progress-bar" style="width:' + w + '%;background:' + color + '"></div></div><span class="score-num" style="color:' + color + '">' + score.toFixed(1) + '</span></div>';
  }
  return '<div class="progress" style="height:14px;"><div class="progress-bar" style="width:' + w + '%;background:' + color + '"></div></div>';
}
function getCountryGroup(c) {
  if (c === 'JP') return 'JP';
  if (c === 'TW') return 'TW';
  return '기타';
}
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Global Search (sidebar) ───
function handleGlobalSearch(q) {
  if (!DATA) return;
  if (!q.trim()) return;
  chFilters.search = q;
  document.querySelectorAll('.navbar-nav .nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.view === 'channels');
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-channels').classList.add('active');
  expandedRow = null;
  renderChannelFilters();
  renderChannelTable();
}

// ─── Load data ───
fetch('/influencer_data.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    renderDashboard();
    renderChannels();
    renderCategories();
    renderCompare();
  })
  .catch(err => {
    document.querySelector('.page-wrapper').innerHTML = '<div class="container-xl mt-4"><div class="card"><div class="card-body text-center py-5"><h3>데이터 로드 실패</h3><p class="text-muted mt-2">' + err.message + '</p></div></div></div>';
  });

// =============================================
// VIEW 1: Dashboard
// =============================================
function renderDashboard() {
  const infs = DATA.influencers;
  const ytInfs = infs.filter(i => i.platform === 'youtube');
  const igCnt = infs.filter(i => i.platform === 'instagram').length;
  const fbCnt = infs.filter(i => i.platform === 'facebook').length;
  const totalContent = infs.reduce((s, i) => s + (i.content_count || 0), 0);
  const avgFollowers = infs.length ? Math.round(infs.reduce((s, i) => s + i.followers, 0) / infs.length) : 0;
  const scoredInfs = infs.filter(i => i.pure_score != null);
  const avgScore = scoredInfs.length ? (scoredInfs.reduce((s, i) => s + i.pure_score, 0) / scoredInfs.length).toFixed(1) : '-';
  const sCount = infs.filter(i => i.grade === 'S').length;
  const aCount = infs.filter(i => i.grade === 'A').length;

  const kpis = [
    { label: '총 채널', value: infs.length, sub: 'YouTube ' + ytInfs.length + ' / IG ' + igCnt + ' / FB ' + fbCnt, icon: '&#128101;', color: 'bg-primary-lt' },
    { label: '활성 콘텐츠', value: fmtFull(totalContent), sub: '채널 평균 ' + (infs.length ? Math.round(totalContent / infs.length) : 0) + '개', icon: '&#127909;', color: 'bg-green-lt' },
    { label: '평균 구독자', value: fmt(avgFollowers), sub: '전체 채널 평균', icon: '&#128200;', color: 'bg-blue-lt' },
    { label: '평균 Pure Score', value: avgScore, sub: 'S등급 ' + sCount + ' / A등급 ' + aCount, icon: '&#11088;', color: 'bg-yellow-lt' }
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map(k => {
    return '<div class="col-sm-6 col-lg-3"><div class="card card-accent"><div class="card-body"><div class="d-flex align-items-center mb-2"><div class="subheader text-muted">' + k.label + '</div></div><div class="kpi-number">' + k.value + '</div><div class="kpi-sub text-muted mt-1">' + k.sub + '</div></div></div></div>';
  }).join('');

  // TOP 7 horizontal bar
  var top7 = infs.slice().sort((a,b) => b.followers - a.followers).slice(0, 7).reverse();
  if (charts.top5) charts.top5.destroy();

function renderChannels() {

}

function setChFilter(key, val) {
  chFilters[key] = val;
  expandedRow = null;
  renderChannelFilters();
  renderChannelTable();
}

function getFilteredInfluencers() {
  var list = DATA.influencers.slice();
  if (chFilters.platform !== 'all') list = list.filter(i => i.platform === chFilters.platform);
  if (chFilters.tier !== 'all') {
    if (chFilters.tier === 'unset') list = list.filter(i => !i.tier || i.tier === 'unset');
    else list = list.filter(i => i.tier === chFilters.tier);
  }
  if (chFilters.category !== 'all') list = list.filter(i => i.category === chFilters.category);
  if (chFilters.country !== 'all') {
    if (chFilters.country === '기타') list = list.filter(i => i.country !== 'JP' && i.country !== 'TW');
    else list = list.filter(i => i.country === chFilters.country);
  }
  if (chFilters.grade !== 'all') list = list.filter(i => i.grade === chFilters.grade);
  if (chFilters.scoreMin !== '') {
    var mn = parseFloat(chFilters.scoreMin);
    list = list.filter(i => i.pure_score != null && i.pure_score >= mn);
  }
  if (chFilters.scoreMax !== '') {
    var mx = parseFloat(chFilters.scoreMax);
    list = list.filter(i => i.pure_score != null && i.pure_score <= mx);
  }
  if (chFilters.hasContent) {
    list = list.filter(i => (DATA.top_contents || []).some(c => c.influencer_id === i.id));
  }
  if (chFilters.search) {
    var q = chFilters.search.toLowerCase();
    list = list.filter(i =>
      (i.display_name||'').toLowerCase().indexOf(q) >= 0 ||
      (i.username||'').toLowerCase().indexOf(q) >= 0 ||
      (i.bio||'').toLowerCase().indexOf(q) >= 0 ||
      (CAT_KR[i.category]||i.category||'').toLowerCase().indexOf(q) >= 0
    );
  }
  if (channelSortCol) {
    list.sort((a, b) => {
      var va, vb;
      if (channelSortCol === 'er') { va = calcER(a); vb = calcER(b); }
      else if (channelSortCol === 'pure_score') { va = a.pure_score || 0; vb = b.pure_score || 0; }
      else { va = a[channelSortCol]; vb = b[channelSortCol]; }
      if (typeof va === 'string') return channelSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return channelSortAsc ? (va||0) - (vb||0) : (vb||0) - (va||0);
    });
  }
  return list;
}

function renderChannelTable() {
  var list = getFilteredInfluencers();
  document.getElementById('channel-count').innerHTML = '<span class="badge bg-primary-lt">' + list.length + '개 채널</span>';
  var cols = [
    { key: '#', label: '#' },
    { key: 'display_name', label: '채널' },
    { key: 'platform', label: '플랫폼' },
    { key: 'country', label: '국가' },
    { key: 'followers', label: '구독자', num: true },
    { key: 'content_count', label: '콘텐츠', num: true },
    { key: 'avg_views', label: '평균조회', num: true },
    { key: 'er', label: '참여율', num: true },
    { key: 'pure_score', label: 'Score', num: true },
    { key: 'grade', label: '등급' }
  ];

  var html = '<table class="table table-vcenter table-hover"><thead><tr>';
  cols.forEach(c => {
    if (c.key === '#') { html += '<th style="width:40px">#</th>'; return; }
    var isSorted = channelSortCol === c.key;
    var cls = 'sortable ' + (c.num ? 'num ' : '') + (isSorted ? (channelSortAsc ? 'sort-asc' : 'sort-desc') : '');
    html += '<th class="' + cls + '" onclick="sortChannels(\'' + c.key + '\')">' + c.label + '<span class="sort-arrow"></span></th>';
  });
  html += '</tr></thead><tbody>';

  list.forEach((inf, idx) => {
    var er = calcER(inf);

    html += '<tr class="expandable ' + (isExpanded?'expanded':'') + '" onclick="toggleExpand(\'' + inf.id + '\')">';

    html += '<td>' + platformBadge(inf.platform) + '</td>';
    html += '<td>' + (inf.country || '-') + '</td>';
    html += '<td class="num">' + fmt(inf.followers) + '</td>';
    html += '<td class="num">' + inf.content_count + '</td>';
    html += '<td class="num">' + fmt(inf.avg_views) + '</td>';
    html += '<td class="num">' + pct(er) + '</td>';
    html += '<td class="num">' + scoreBarHtml(inf.pure_score, 'sm') + '</td>';
    html += '<td>' + gradeBadge(inf.grade) + '</td>';
    html += '</tr>';

    if (isExpanded) {
      html += '<tr class="expand-row"><td colspan="' + cols.length + '">';
      html += renderExpandContent(inf);
      html += '</td></tr>';
    }
  });

  if (!list.length) {
    html += '<tr><td colspan="' + cols.length + '" class="text-center text-muted py-5">조건에 맞는 채널이 없습니다</td></tr>';
  }

  html += '</tbody></table>';
  document.getElementById('channel-table-wrap').innerHTML = html;
}

// ─── Content Ledger ───
function renderContentLedger(inf, contents, avgER) {
  if (!contents.length) {
    return '<div class="card mt-3"><div class="card-body text-muted small">수집된 콘텐츠가 없습니다</div></div>';
  }

  if (!window._ledgerState) window._ledgerState = {};
  if (!window._ledgerState[inf.id]) {
    window._ledgerState[inf.id] = { sort: 'date', typeFilter: 'all', showAll: false };
  }
  var st = window._ledgerState[inf.id];

  var filtered = contents;
  if (st.typeFilter !== 'all') {
    filtered = contents.filter(c => c.content_type === st.typeFilter);
  }

  filtered = filtered.slice();
  if (st.sort === 'date') {
    filtered.sort((a,b) => new Date(b.published_at||0) - new Date(a.published_at||0));
  } else if (st.sort === 'views') {
    filtered.sort((a,b) => (b.views||0) - (a.views||0));
  } else if (st.sort === 'likes') {
    filtered.sort((a,b) => (b.likes||0) - (a.likes||0));
  }

  var showCount = st.showAll ? filtered.length : Math.min(20, filtered.length);
  var displayItems = filtered.slice(0, showCount);

  var html = '<div class="card mt-3"><div class="card-body">';
  html += '<h4 class="mb-2">콘텐츠 원장 (Content Ledger) &mdash; 총 ' + contents.length + '건' + (st.typeFilter !== 'all' ? ' (필터: ' + st.typeFilter + ' ' + filtered.length + '건)' : '') + '</h4>';

  // Controls
  html += '<div class="d-flex flex-wrap gap-3 align-items-center mb-2">';
  html += '<div><label class="form-label mb-0 text-muted small">유형</label><div class="btn-group ms-2" role="group">';
  ['all','video','short'].forEach(t => {
    var label = t === 'all' ? '전체' : t;
    html += '<button class="btn btn-sm ' + (st.typeFilter===t?'btn-primary':'btn-outline-secondary') + '" onclick="setLedgerFilter(' + inf.id + ',\'typeFilter\',\'' + t + '\')">' + label + '</button>';
  });
  html += '</div></div>';
  html += '<div><label class="form-label mb-0 text-muted small">정렬</label><div class="btn-group ms-2" role="group">';
  [['date','날짜순'],['views','조회수순'],['likes','좋아요순']].forEach(([v,l]) => {
    html += '<button class="btn btn-sm ' + (st.sort===v?'btn-primary':'btn-outline-secondary') + '" onclick="setLedgerFilter(' + inf.id + ',\'sort\',\'' + v + '\')">' + l + '</button>';
  });
  html += '</div></div>';
  html += '</div>';

  html += '<div class="table-responsive" style="max-height:400px;overflow:auto"><table class="table table-vcenter table-sm"><thead><tr><th>#</th><th>제목</th><th>유형</th><th class="num">조회수</th><th class="num">좋아요</th><th class="num">댓글</th><th class="num">참여율</th><th>날짜</th></tr></thead><tbody>';
  displayItems.forEach((c, i) => {
    var cEr = c.views > 0 ? ((c.likes + c.comments) / c.views * 100).toFixed(2) : '0';
    var avgERVal = parseFloat(avgER);
    var erCls = parseFloat(cEr) > avgERVal * 1.5 ? 'text-success fw-bold' : parseFloat(cEr) < avgERVal * 0.5 ? 'text-danger' : '';
    html += '<tr>';
    html += '<td class="text-muted">' + (i + 1) + '</td>';
    html += '<td><a href="' + (c.content_url || '#') + '" target="_blank" class="text-primary text-decoration-none" style="font-size:12px">' + (c.title ? escHtml(c.title.substring(0, 45)) : '-') + (c.title && c.title.length > 45 ? '...' : '') + '</a></td>';
    html += '<td><span class="badge bg-secondary-lt">' + (c.content_type || '-') + '</span></td>';
    html += '<td class="num">' + fmtFull(c.views) + '</td>';
    html += '<td class="num">' + fmtFull(c.likes) + '</td>';
    html += '<td class="num">' + fmtFull(c.comments) + '</td>';
    html += '<td class="num ' + erCls + '">' + cEr + '%</td>';
    html += '<td class="text-muted" style="font-size:11px">' + (c.published_at ? new Date(c.published_at).toLocaleDateString('ko-KR') : '-') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  if (!st.showAll && filtered.length > 20) {
    html += '<button class="btn-more" onclick="setLedgerFilter(' + inf.id + ',\'showAll\',true)">더보기 (' + (filtered.length - 20) + '건 남음)</button>';
  } else if (st.showAll && filtered.length > 20) {
    html += '<button class="btn-more" onclick="setLedgerFilter(' + inf.id + ',\'showAll\',false)">접기</button>';
  }

  html += '</div></div>';
  return html;
}

function setLedgerFilter(infId, key, val) {
  if (!window._ledgerState) window._ledgerState = {};
  if (!window._ledgerState[infId]) window._ledgerState[infId] = { sort: 'date', typeFilter: 'all', showAll: false };
  window._ledgerState[infId][key] = val;
  renderChannelTable();
}

// ─── Memo System ───
function getMemos(infId) {
  try {
    var raw = localStorage.getItem('memos_' + infId);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  var old = localStorage.getItem('memo_' + infId);
  if (old) {
    var arr = [{ text: old, createdAt: new Date().toISOString(), updatedAt: null }];
    localStorage.setItem('memos_' + infId, JSON.stringify(arr));
    localStorage.removeItem('memo_' + infId);
    return arr;
  }
  return [];
}

function saveMemos(infId, memos) {
  localStorage.setItem('memos_' + infId, JSON.stringify(memos));
}

function renderMemoSystem(inf) {
  var memos = getMemos(inf.id);
  var html = '<div class="card mt-3"><div class="card-body">';
  html += '<h4 class="mb-2">메모</h4>';

  html += '<div id="memo-list-' + inf.id + '">';
  memos.forEach((m, idx) => {
    html += '<div class="memo-item card card-body mb-2 p-2" id="memo-item-' + inf.id + '-' + idx + '">';
    html += '<div class="memo-time text-muted">' + new Date(m.createdAt).toLocaleString('ko-KR');
    if (m.updatedAt) html += ' (수정: ' + new Date(m.updatedAt).toLocaleString('ko-KR') + ')';
    html += '</div>';
    html += '<div class="memo-text mt-1" id="memo-text-' + inf.id + '-' + idx + '">' + escHtml(m.text) + '</div>';
    html += '<div class="memo-actions"><div class="btn-group btn-group-sm">';
    html += '<button class="btn btn-sm btn-outline-secondary" onclick="editMemo(' + inf.id + ',' + idx + ')">수정</button>';
    html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteMemo(' + inf.id + ',' + idx + ')">삭제</button>';
    html += '</div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="mt-2" id="memo-add-' + inf.id + '">';
  html += '<textarea id="memo-input-' + inf.id + '" class="form-control form-control-sm" rows="2" placeholder="새 메모를 입력하세요..."></textarea>';
  html += '<div class="mt-2"><button class="btn btn-sm btn-primary" onclick="addMemo(' + inf.id + ')">메모 추가</button></div>';
  html += '</div>';

  html += '</div></div>';
  return html;
}

function addMemo(infId) {
  var input = document.getElementById('memo-input-' + infId);
  if (!input || !input.value.trim()) return;
  var memos = getMemos(infId);
  memos.push({ text: input.value.trim(), createdAt: new Date().toISOString(), updatedAt: null });
  saveMemos(infId, memos);
  renderChannelTable();
}

function editMemo(infId, idx) {
  var memos = getMemos(infId);
  var memo = memos[idx];
  if (!memo) return;
  var textEl = document.getElementById('memo-text-' + infId + '-' + idx);
  if (!textEl) return;

  textEl.innerHTML = '<textarea id="memo-edit-' + infId + '-' + idx + '" class="form-control form-control-sm" rows="2">' + escHtml(memo.text) + '</textarea>' +
    '<div class="mt-1 d-flex gap-1"><button class="btn btn-sm btn-primary" onclick="saveMemoEdit(' + infId + ',' + idx + ')">저장</button><button class="btn btn-sm btn-outline-secondary" onclick="renderChannelTable()">취소</button></div>';
}

function saveMemoEdit(infId, idx) {
  var textarea = document.getElementById('memo-edit-' + infId + '-' + idx);
  if (!textarea || !textarea.value.trim()) return;
  var memos = getMemos(infId);
  memos[idx].text = textarea.value.trim();
  memos[idx].updatedAt = new Date().toISOString();
  saveMemos(infId, memos);
  renderChannelTable();
}

function deleteMemo(infId, idx) {
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  var memos = getMemos(infId);
  memos.splice(idx, 1);
  saveMemos(infId, memos);
  renderChannelTable();
}

function toggleExpand(id) {
  var nid = Number(id);
  expandedRow = expandedRow === nid ? null : nid;
  renderChannelTable();
}

function sortChannels(col) {
  if (channelSortCol === col) channelSortAsc = !channelSortAsc;
  else { channelSortCol = col; channelSortAsc = col === 'display_name' || col === 'platform' || col === 'category' || col === 'country'; }
  renderChannelTable();
}

// =============================================
var catViewFilters = { search: '', country: 'all' };

function renderCategories() {
  renderCatFilterBar();

}

function renderCatFilterBar() {
  var html = '<div class="d-flex flex-wrap gap-3 align-items-center">';
  html += '<div><label class="form-label mb-1 text-muted small">검색</label><input type="text" class="form-control form-control-sm" style="min-width:180px" placeholder="카테고리 검색..." value="' + escHtml(catViewFilters.search) + '" oninput="setCatFilter(\'search\',this.value)"></div>';
  html += '<div><label class="form-label mb-1 text-muted small">국가</label><div class="btn-group" role="group">';
  [['all','전체'],['JP','JP'],['TW','TW']].forEach(([v,l]) => {
    html += '<button class="btn btn-sm ' + (catViewFilters.country===v?'btn-primary':'btn-outline-secondary') + '" onclick="setCatFilter(\'country\',\'' + v + '\')">' + l + '</button>';
  });
  html += '</div></div>';
  html += '</div>';
  document.getElementById('cat-filter-bar').innerHTML = html;
}

function setCatFilter(key, val) {
  catViewFilters[key] = val;
  renderCatFilterBar();
  renderCatCards();
  renderCatChart();
}

function getFilteredCatInfluencers() {
  var list = DATA.influencers.slice();
  if (catViewFilters.country !== 'all') {
    list = list.filter(i => i.country === catViewFilters.country);
  }
  return list;
}

function renderCatCards() {
  var infs = getFilteredCatInfluencers();
  var catMap = {};
  infs.forEach(i => {
    if (!catMap[i.category]) catMap[i.category] = [];
    catMap[i.category].push(i);
  });

  var catKeys = Object.keys(catMap);
  if (catViewFilters.search) {
    var q = catViewFilters.search.toLowerCase();
    catKeys = catKeys.filter(c => c.toLowerCase().indexOf(q) >= 0 || (CAT_KR[c]||'').toLowerCase().indexOf(q) >= 0);
  }

  var cardsHtml = '';
  catKeys.forEach((cat, ci) => {
    var catInfs = catMap[cat];
    var avgF = catInfs.length ? Math.round(catInfs.reduce((s,i) => s+i.followers, 0) / catInfs.length) : 0;
    var avgV = catInfs.length ? Math.round(catInfs.reduce((s,i) => s+(i.avg_views||0), 0) / catInfs.length) : 0;
    var avgS = catInfs.filter(i=>i.pure_score!=null).length ? (catInfs.filter(i=>i.pure_score!=null).reduce((s,i)=>s+i.pure_score,0)/catInfs.filter(i=>i.pure_score!=null).length).toFixed(1) : '-';

    var top3 = catInfs.slice().sort((a,b) => (b.pure_score||0)-(a.pure_score||0)).slice(0,3);

    cardsHtml += '<div class="col-sm-6 col-lg-4 col-xl-3">';
    cardsHtml += '<div class="card cat-card" onclick="goToCatChannel(\'' + cat + '\')">';
    cardsHtml += '<div class="cat-border" style="background:' + PALETTE[ci % PALETTE.length] + '"></div>';
    cardsHtml += '<div class="card-body">';
    cardsHtml += '<h3 class="card-title mb-3">' + (CAT_KR[cat] || cat) + '</h3>';
    cardsHtml += '<div class="mb-1 small text-muted">채널 수: <strong class="text-dark">' + catInfs.length + '</strong></div>';
    cardsHtml += '<div class="mb-1 small text-muted">평균 구독자: <strong class="text-dark">' + fmt(avgF) + '</strong></div>';
    cardsHtml += '<div class="mb-1 small text-muted">평균 조회수: <strong class="text-dark">' + fmt(avgV) + '</strong></div>';
    cardsHtml += '<div class="mb-2 small text-muted">평균 Score: <strong class="text-dark">' + avgS + '</strong></div>';

    if (top3.length) {
      cardsHtml += '<div class="pt-2 border-top">';
      top3.forEach((inf, rank) => {
        var avatarSrc = inf.profile_image_url || 'https://yt3.googleusercontent.com/ytc/default_avatar.jpg';
        cardsHtml += '<div class="d-flex align-items-center justify-content-between py-1">';
        cardsHtml += '<div class="d-flex align-items-center gap-1"><span class="avatar avatar-xs" style="background-image:url(' + escHtml(avatarSrc) + ')"></span><span class="small fw-medium">' + (rank+1) + '. ' + escHtml(inf.display_name) + '</span></div>';
        cardsHtml += '<span class="small fw-bold" style="color:' + scoreColor(inf.pure_score||0) + '">' + (inf.pure_score != null ? inf.pure_score.toFixed(1) : '-') + '</span>';
        cardsHtml += '</div>';
      });
      cardsHtml += '</div>';
    }

    cardsHtml += '</div></div></div>';
  });

  if (!catKeys.length) {
    cardsHtml = '<div class="col-12 text-center text-muted py-5">조건에 맞는 카테고리가 없습니다</div>';
  }

  document.getElementById('cat-cards').innerHTML = cardsHtml;
}

function renderCatChart() {
  var infs = getFilteredCatInfluencers();
  var catMap = {};
  infs.forEach(i => {
    if (!catMap[i.category]) catMap[i.category] = [];
    catMap[i.category].push(i);
  });

  var catKeys = Object.keys(catMap);
  var labels = catKeys.map(c => CAT_KR[c]||c);
  var avgFollowers = catKeys.map(cat => {
    var ci = catMap[cat];
    return ci.length ? Math.round(ci.reduce((s,i) => s+i.followers, 0) / ci.length) : 0;
  });
  var avgViews = catKeys.map(cat => {
    var ci = catMap[cat];
    return ci.length ? Math.round(ci.reduce((s,i) => s+(i.avg_views||0), 0) / ci.length) : 0;
  });

  if (charts.catCompare) charts.catCompare.destroy();
  charts.catCompare = new Chart(document.getElementById('chart-cat-compare'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: '평균 구독자', data: avgFollowers, backgroundColor: '#ff003b', borderRadius: 6, barPercentage: 0.4 },
        { label: '평균 조회수', data: avgViews, backgroundColor: '#1e56b0', borderRadius: 6, barPercentage: 0.4 }
      ]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { family: 'Noto Sans KR', size: 12 }, usePointStyle: true, padding: 16 } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtFull(ctx.raw) } }
      },
      scales: {
        x: { ticks: { font: { family: 'Poppins', size: 11 }, callback: v => fmt(v) }, grid: { color: '#f1f5f9' } },
        y: { ticks: { font: { family: 'Noto Sans KR', size: 12 } }, grid: { display: false } }
      }
    }
  });
}

function goToCatChannel(cat) {
  chFilters.category = cat;
  expandedRow = null;
  document.querySelectorAll('.navbar-nav .nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.view === 'channels');
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-channels').classList.add('active');
  renderChannelFilters();
  renderChannelTable();
}

// VIEW 4: Compare
// =============================================
var compareSelected = [];
var compareFilters = { search: '', country: 'all', category: 'all' };

function renderCompare() {
  var infs = DATA.influencers;
  if (!compareSelected.length) {
    compareSelected = infs.slice().sort((a,b) => b.followers - a.followers).slice(0, 3).map(i => String(i.id));
  }
  renderCompareFilterBar();
  renderCompareSelector();
  renderCompareCharts();
}

function renderCompareFilterBar() {
  var allCats = [];
  var seen = {};
  DATA.influencers.forEach(i => { if (!seen[i.category]) { seen[i.category]=true; allCats.push(i.category); } });

  var html = '<div class="d-flex flex-wrap gap-3 align-items-center">';
  html += '<div><label class="form-label mb-1 text-muted small">검색</label><input type="text" class="form-control form-control-sm" style="min-width:180px" placeholder="인플루언서 검색..." value="' + escHtml(compareFilters.search) + '" oninput="setCompareFilter(\'search\',this.value)"></div>';
  html += '<div><label class="form-label mb-1 text-muted small">국가</label><div class="btn-group" role="group">';
  [['all','전체'],['JP','JP'],['TW','TW'],['기타','기타']].forEach(([v,l]) => {
    html += '<button class="btn btn-sm ' + (compareFilters.country===v?'btn-primary':'btn-outline-secondary') + '" onclick="setCompareFilter(\'country\',\'' + v + '\')">' + l + '</button>';
  });
  html += '</div></div>';
  html += '<div><label class="form-label mb-1 text-muted small">카테고리</label><select class="form-select form-select-sm" style="min-width:140px" onchange="setCompareFilter(\'category\',this.value)">';
  html += '<option value="all">전체</option>';

    html += '<option value="' + c + '" ' + (compareFilters.category===c?'selected':'') + '>' + (CAT_KR[c]||c) + '</option>';
  });
  html += '</select></div>';
  html += '</div>';
  document.getElementById('compare-filter-bar').innerHTML = html;
}

function setCompareFilter(key, val) {
  compareFilters[key] = val;
  renderCompareFilterBar();
  renderCompareSelector();
}

function getFilteredCompareInfluencers() {
  var list = DATA.influencers.slice();
  if (compareFilters.country !== 'all') {
    if (compareFilters.country === '기타') list = list.filter(i => i.country !== 'JP' && i.country !== 'TW');
    else list = list.filter(i => i.country === compareFilters.country);
  }
  if (compareFilters.category !== 'all') list = list.filter(i => i.category === compareFilters.category);
  if (compareFilters.search) {
    var q = compareFilters.search.toLowerCase();
    list = list.filter(i =>
      (i.display_name||'').toLowerCase().indexOf(q) >= 0 || (i.username||'').toLowerCase().indexOf(q) >= 0
    );
  }
  return list;
}

function renderCompareSelector() {
  var infs = getFilteredCompareInfluencers();
  var html = '<label class="form-label text-muted fw-bold mb-2">비교 대상 선택 (최대 5개):</label><div class="d-flex flex-wrap gap-2">';
  infs.forEach(inf => {
    var sid = String(inf.id);
    var sel = compareSelected.indexOf(sid) >= 0;
    html += '<div class="compare-chip ' + (sel?'selected':'') + '" onclick="toggleCompare(\'' + sid + '\')">';
    html += '<span>' + escHtml(inf.display_name) + '</span>';
    if (inf.grade) html += ' ' + gradeBadge(inf.grade);
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('compare-selector').innerHTML = html;
}

function toggleCompare(id) {
  var sid = String(id);
  var idx = compareSelected.indexOf(sid);
  if (idx >= 0) {
    if (compareSelected.length <= 1) return;
    compareSelected.splice(idx, 1);
  } else {
    if (compareSelected.length >= 5) return;
    compareSelected.push(sid);
  }
  renderCompareSelector();
  renderCompareCharts();
}

function renderCompareCharts() {
  var infs = DATA.influencers;
  var sel = infs.filter(i => compareSelected.indexOf(String(i.id)) >= 0);

  var maxF = Math.max(...infs.map(i => i.followers)) || 1;
  var maxER = Math.max(...infs.filter(i => i.avg_views > 0).map(i => calcER(i))) || 1;
  var maxCC = Math.max(...infs.map(i => i.content_count)) || 1;
  var maxAV = Math.max(...infs.map(i => i.avg_views || 0)) || 1;
  var maxTV = Math.max(...infs.map(i => i.total_views || 0)) || 1;

  if (charts.radar) charts.radar.destroy();
  charts.radar = new Chart(document.getElementById('chart-radar'), {
    type: 'radar',
    data: {
      labels: ['도달력', '참여율', '콘텐츠양', '평균조회', '규모'],
      datasets: sel.map((inf, idx) => ({
        label: inf.display_name,
        data: [
          (inf.followers / maxF) * 100,
          (calcER(inf) / maxER) * 100,
          (inf.content_count / maxCC) * 100,
          ((inf.avg_views || 0) / maxAV) * 100,
          ((inf.total_views || 0) / maxTV) * 100
        ],
        backgroundColor: PALETTE[idx % PALETTE.length] + '22',
        borderColor: PALETTE[idx % PALETTE.length],
        borderWidth: 2, pointBackgroundColor: PALETTE[idx % PALETTE.length], pointRadius: 4
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true, max: 100,
          ticks: { stepSize: 25, font: { family: 'Poppins', size: 10 }, backdropColor: 'transparent' },
          pointLabels: { font: { family: 'Noto Sans KR', size: 12, weight: '600' } },
          grid: { color: '#e2e8f0' }, angleLines: { color: '#e2e8f0' }
        }
      },
      plugins: { legend: { position: 'bottom', labels: { font: { family: 'Noto Sans KR', size: 11 }, usePointStyle: true, padding: 12 } } }
    }
  });

  // Country breakdown
  var countryMap = {};
  infs.forEach(i => { var c = i.country || '기타'; countryMap[c] = (countryMap[c]||0)+1; });
  if (charts.country) charts.country.destroy();
  charts.country = new Chart(document.getElementById('chart-country'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(countryMap).map(c => COUNTRY_KR[c]||c),
      datasets: [{ data: Object.values(countryMap), backgroundColor: PALETTE.slice(0, Object.keys(countryMap).length), borderWidth: 2, borderColor: '#fff' }]
    },
    options: { responsive: true, cutout: '55%', plugins: { legend: { position: 'bottom', labels: { font: { family: 'Noto Sans KR', size: 12 }, usePointStyle: true, padding: 14 } } } }
  });

  // Comparison table
  var metrics = [
    { label: '등급', key: 'grade', fmt: v => v || '-' },
    { label: 'Pure Score', key: 'pure_score', fmt: v => v != null ? v.toFixed(1) : '-' },
    { label: '구독자', key: 'followers', fmt: fmtFull },
    { label: '평균 조회수', key: 'avg_views', fmt: fmtFull },
    { label: '평균 좋아요', key: 'avg_likes', fmt: fmtFull },
    { label: '평균 댓글', key: 'avg_comments', fmt: fmtFull },
    { label: '참여율', key: 'er', fmt: pct },
    { label: '콘텐츠 수', key: 'content_count', fmt: v => v },
    { label: '총 조회수', key: 'total_views', fmt: fmtFull },
    { label: '국가', key: 'country', fmt: v => COUNTRY_KR[v]||v||'-' }
  ];

  var tHtml = '<table class="table table-vcenter"><thead><tr><th>지표</th>';
  sel.forEach(inf => { tHtml += '<th class="num">' + escHtml(inf.display_name) + '</th>'; });
  tHtml += '</tr></thead><tbody>';
  metrics.forEach(m => {
    tHtml += '<tr>';
    tHtml += '<td class="fw-bold">' + m.label + '</td>';
    if (m.key === 'grade' || m.key === 'country') {
      sel.forEach(inf => {
        var v = inf[m.key];
        if (m.key === 'grade') {
          tHtml += '<td class="num">' + gradeBadge(v) + '</td>';
        } else {
          tHtml += '<td class="num">' + m.fmt(v) + '</td>';
        }
      });
    } else {
      var vals = sel.map(inf => m.key === 'er' ? calcER(inf) : (inf[m.key] || 0));
      var maxVal = Math.max(...vals);
      sel.forEach((inf, i) => {
        var v = m.key === 'er' ? calcER(inf) : (inf[m.key] || 0);
        var isMax = v === maxVal && v > 0;
        tHtml += '<td class="num" style="' + (isMax ? 'color:var(--tblr-primary);font-weight:700' : '') + '">' + m.fmt(v) + '</td>';
      });
    }
    tHtml += '</tr>';
  });
  tHtml += '</tbody></table>';
  document.getElementById('compare-table-wrap').innerHTML = tHtml;

  // Content type breakdown
  var allContents = DATA.top_contents || [];
  var typeMap = {};
  allContents.forEach(c => { var t = c.content_type || 'unknown'; typeMap[t] = (typeMap[t]||0)+1; });
  var typeLabels = Object.keys(typeMap);
  var typeData = Object.values(typeMap);

  if (charts.contentType) charts.contentType.destroy();
  if (typeLabels.length) {
    charts.contentType = new Chart(document.getElementById('chart-content-type'), {
      type: 'bar',
      data: {
        labels: typeLabels,
        datasets: [{ data: typeData, backgroundColor: PALETTE.slice(0, typeLabels.length), borderRadius: 6, barThickness: 40 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + '개' } } },
        scales: {
          x: { ticks: { font: { family: 'Poppins', size: 11 }, stepSize: 1 }, grid: { color: '#f1f5f9' } },
          y: { ticks: { font: { family: 'Noto Sans KR', size: 12 } }, grid: { display: false } }
        }
      }
    });
  } else {
    document.getElementById('chart-content-type').parentElement.innerHTML = '<p class="text-muted small p-3">콘텐츠 유형 데이터가 없습니다</p>';
  }
}
</script>
</body>
</html>
