<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setoworks · Jellop+α Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --brand-red:#ff003b;
    --charcoal:#212121;
    --bg:#191919;
    --card-bg:rgba(255,255,255,0.04);
    --card-border:rgba(255,255,255,0.08);
    --text-primary:#f0f0f0;
    --text-secondary:rgba(255,255,255,0.55);
    --radius:14px;
  }

  html{font-size:16px}

  body{
    font-family:'Noto Sans KR','Poppins',sans-serif;
    background:var(--bg);
    color:var(--text-primary);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    position:relative;
  }

  /* subtle dot pattern */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:28px 28px;
    pointer-events:none;
    z-index:0;
  }

  /* subtle gradient glow behind logo area */
  body::after{
    content:'';
    position:fixed;
    top:-180px;left:50%;
    transform:translateX(-50%);
    width:700px;height:500px;
    background:radial-gradient(ellipse,rgba(255,0,59,0.08) 0%,transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .container{
    position:relative;z-index:1;
    width:100%;max-width:900px;
    padding:60px 24px 40px;
    display:flex;flex-direction:column;align-items:center;
    flex:1;
  }

  /* ─── Header / Logo ─── */
  .header{
    text-align:center;
    margin-bottom:56px;
    animation:fadeDown .7s ease-out both;
  }

  .logo-img{
    height:56px;
    margin-bottom:16px;
    filter:drop-shadow(0 0 30px rgba(255,0,59,0.25));
  }

  .brand-name{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:1.75rem;
    letter-spacing:6px;
    color:#fff;
    margin-bottom:6px;
  }

  .brand-sub{
    font-family:'Poppins','Noto Sans KR',sans-serif;
    font-weight:400;
    font-size:.95rem;
    color:var(--text-secondary);
    letter-spacing:1.5px;
  }

  /* ─── Grid ─── */
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    width:100%;
  }

  /* ─── Card ─── */
  .card{
    position:relative;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    padding:36px 32px 32px;
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    gap:16px;
    transition:transform .25s ease,box-shadow .35s ease,border-color .3s ease;
    cursor:pointer;
    overflow:hidden;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }

  .card::before{
    content:'';
    position:absolute;inset:0;
    border-radius:var(--radius);
    opacity:0;
    transition:opacity .35s ease;
    pointer-events:none;
  }

  .card:hover{
    transform:translateY(-4px) scale(1.015);
    border-color:rgba(255,255,255,0.14);
  }
  .card:hover::before{opacity:1}

  /* accent glow per card */
  .card[data-accent="red"]::before{box-shadow:inset 0 0 40px rgba(255,0,59,0.08),0 8px 40px rgba(255,0,59,0.12)}
  .card[data-accent="blue"]::before{box-shadow:inset 0 0 40px rgba(30,86,176,0.08),0 8px 40px rgba(30,86,176,0.12)}
  .card[data-accent="green"]::before{box-shadow:inset 0 0 40px rgba(13,124,95,0.08),0 8px 40px rgba(13,124,95,0.12)}
  .card[data-accent="purple"]::before{box-shadow:inset 0 0 40px rgba(109,40,217,0.08),0 8px 40px rgba(109,40,217,0.12)}

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .icon-wrap{
    width:52px;height:52px;
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .icon-wrap svg{width:26px;height:26px;stroke-width:1.6}

  .card[data-accent="red"] .icon-wrap{background:rgba(255,0,59,0.12)}
  .card[data-accent="red"] .icon-wrap svg{color:#ff003b}
  .card[data-accent="blue"] .icon-wrap{background:rgba(30,86,176,0.12)}
  .card[data-accent="blue"] .icon-wrap svg{color:#4d8be8}
  .card[data-accent="green"] .icon-wrap{background:rgba(13,124,95,0.12)}
  .card[data-accent="green"] .icon-wrap svg{color:#22c997}
  .card[data-accent="purple"] .icon-wrap{background:rgba(109,40,217,0.12)}
  .card[data-accent="purple"] .icon-wrap svg{color:#a370f7}

  .arrow-icon{
    color:rgba(255,255,255,0.2);
    transition:color .25s ease,transform .25s ease;
  }
  .card:hover .arrow-icon{
    color:rgba(255,255,255,0.6);
    transform:translateX(3px);
  }

  .card-title{
    font-family:'Poppins','Noto Sans KR',sans-serif;
    font-weight:600;
    font-size:1.15rem;
    color:#fff;
    line-height:1.3;
  }

  .card-subtitle{
    font-size:.84rem;
    color:var(--text-secondary);
    line-height:1.5;
    font-weight:300;
  }

  /* accent underline */
  .card-accent-line{
    width:40px;height:3px;border-radius:2px;
    margin-top:auto;
    transition:width .3s ease;
  }
  .card:hover .card-accent-line{width:64px}

  .card[data-accent="red"] .card-accent-line{background:#ff003b}
  .card[data-accent="blue"] .card-accent-line{background:#1e56b0}
  .card[data-accent="green"] .card-accent-line{background:#0d7c5f}
  .card[data-accent="purple"] .card-accent-line{background:#6d28d9}

  /* staggered fade-in */
  .card:nth-child(1){animation:fadeUp .6s .15s ease-out both}
  .card:nth-child(2){animation:fadeUp .6s .25s ease-out both}
  .card:nth-child(3){animation:fadeUp .6s .35s ease-out both}
  .card:nth-child(4){animation:fadeUp .6s .45s ease-out both}

  /* ─── Footer ─── */
  .footer{
    position:relative;z-index:1;
    text-align:center;
    padding:40px 24px 28px;
    font-size:.78rem;
    color:rgba(255,255,255,0.25);
    letter-spacing:.5px;
    font-family:'Poppins',sans-serif;
    animation:fadeUp .6s .55s ease-out both;
  }
  .footer a{color:rgba(255,255,255,0.35);text-decoration:none;transition:color .2s}
  .footer a:hover{color:rgba(255,255,255,0.6)}

  /* ─── Animations ─── */
  @keyframes fadeDown{
    from{opacity:0;transform:translateY(-20px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* ─── Responsive ─── */
  @media(max-width:640px){
    .container{padding:40px 16px 24px}
    .grid{grid-template-columns:1fr;gap:16px}
    .card{padding:28px 24px 24px}
    .brand-name{font-size:1.35rem;letter-spacing:4px}
    .logo-img{height:44px}
  }
</style>
</head>
